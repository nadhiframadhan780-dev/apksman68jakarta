<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Live Chat - SMAN 68 Jakarta</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/id/1/19/Logo_SMAN_68_Jakarta.png">
    <link rel="stylesheet" href="app-style.css">
</head>
<body>
    <div class="status-bar"><span class="time" id="statusTime"></span><span class="icons"><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i></span></div>
    <header class="app-header">
        <div class="header-left">
            <a href="app-home.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
            <div>
                <h1>Helpdesk SMAN 68</h1>
                <span id="chatStatusText">🟢 Online</span>
            </div>
        </div>
    </header>

    <div class="chat-app-container">
        <div class="chat-app-messages" id="chatMessages">
            <div class="chat-bot-msg">Terima kasih telah menghubungi helpdesk SMAN 68 JAKARTA, operator segera membalas pertanyaan Anda.</div>
        </div>
        <div class="chat-app-input">
            <input type="text" id="chatInput" placeholder="Ketik pesan...">
            <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script src="app-script.js"></script>
</body>
</html>
